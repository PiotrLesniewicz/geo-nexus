info:
  name: login-admin
  type: http
  seq: 2
  tags:
    - auth-controller

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "jan.kowalski@geosurvey.pl",
        "password": "GeoAdmin1!"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody();
        bru.setEnvVar("token", response.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
