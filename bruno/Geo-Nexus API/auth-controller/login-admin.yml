    description: OK
    request:
      url: "{{baseUrl}}/api/v1/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "token": "",
            "type": ""
          }
