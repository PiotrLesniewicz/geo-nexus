info:
  name: Get job by identifier
  type: http
  seq: 7
  tags:
    - Jobs

http:
  method: GET
  url: "{{baseUrl}}/api/v1/jobs?jobIdentifier=CRE000/00/01"
  params:
    - name: jobIdentifier
      value: CRE000/00/01
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/jobs"
      method: GET
      params:
        - name: jobIdentifier
          value: ""
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "jobIdentifier": "",
            "description": "",
            "status": "OPEN",
            "street": "",
            "buildingNumber": "",
            "apartmentNumber": "",
            "postalCode": "",
            "city": "",
            "county": "",
            "voivodeship": "",
            "country": "",
            "createdAt": "",
            "companyName": "",
            "nip": "",
            "userName": "",
            "userSurname": ""
          }

docs: Returns job details for a given job identifier within the company
