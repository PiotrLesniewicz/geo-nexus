info:
  name: Create job
  type: http
  seq: 1
  tags:
    - Jobs

http:
  method: POST
  url: "{{baseUrl}}/api/v1/jobs"
  body:
    type: json
    data: |-
      {
        "jobIdentifier": "CRE000/00/01",
        "description": "Pomiar punktów osnowy realizacyjnej",
        "street": "Pl. Bankowy",
        "buildingNumber": "1",
        "apartmentNumber": "",
        "postalCode": "00-005",
        "city": "Warszawa",
        "county": "",
        "voivodeship": "Mazowieckie",
        "country": "Polska"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/jobs"
      method: POST
      body:
        type: json
        data: |-
          {
            "jobIdentifier": "",
            "description": "",
            "street": "",
            "buildingNumber": "",
            "apartmentNumber": "",
            "postalCode": "",
            "city": "",
            "county": "",
            "voivodeship": "",
            "country": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "jobIdentifier": "",
            "description": "",
            "status": "OPEN",
            "street": "",
            "buildingNumber": "",
            "apartmentNumber": "",
            "postalCode": "",
            "city": "",
            "county": "",
            "voivodeship": "",
            "country": "",
            "createdAt": "",
            "companyName": "",
            "nip": "",
            "userName": "",
            "userSurname": ""
          }

docs: Creates a new survey job for the authenticated user's company
