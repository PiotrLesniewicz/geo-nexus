info:
  name: Process leveling file - one_way_double
  type: http
  seq: 3
  tags:
    - Jobs

http:
  method: POST
  url: "{{baseUrl}}/api/v1/jobs/leveling"
  body:
    type: multipart-form
    data:
      - name: jobIdentifier
        type: text
        value: CRE000/00/01
      - name: file
        type: file
        value:
          - /home/piotr/Programming/Portfolio/geo-nexus/sample-files/leveling_one_way_double.csv
      - name: type
        type: text
        value: ONE_WAY_DOUBLE
      - name: startH
        type: text
        value: "100.000"
      - name: endH
        type: text
        value: "101.250"
      - name: observationTime
        type: text
        value: 2024-06-15T10:00:00Z
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/jobs/leveling"
      method: POST
      body:
        type: multipart-form
        data:
          - name: jobIdentifier
            type: text
            value: ""
          - name: file
            type: file
            value: []
          - name: type
            type: text
            value: ""
          - name: startH
            type: text
            value: ""
          - name: endH
            type: text
            value: ""
          - name: observationTime
            type: text
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "levelingType": "ONE_WAY",
            "startHeight": 100,
            "endHeight": 100.5,
            "measuredDifference": 0.502,
            "theoreticalDifference": 0.5,
            "misclosure": 0.002,
            "allowedMisclosure": 0.012,
            "toleranceMet": false,
            "sequenceDistance": 0.486,
            "observationTime": "",
            "generatedAt": "",
            "jobIdentifier": "JOB-2024-001",
            "stations": [
              {
                "stationId": "ST1",
                "backsightId": "BS1",
                "foresightId": "FS1",
                "backDistance": 45,
                "foreDistance": 50,
                "heightDiffFirst": 0.052,
                "heightDiffSecond": 0.0518,
                "heightAvgDiff": 0.0519,
                "stationError": 0.0002,
                "toleranceMet": false,
                "correction": -0.0001,
                "adjustedHeight": 100.0519
              }
            ]
          }

docs: Uploads a CSV or TXT file with leveling observations and calculates the report
