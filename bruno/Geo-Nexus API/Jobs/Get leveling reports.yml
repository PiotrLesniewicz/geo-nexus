info:
  name: Get leveling reports
  type: http
  seq: 8
  tags:
    - Jobs

http:
  method: GET
  url: "{{baseUrl}}/api/v1/jobs/leveling?jobIdentifier=CRE000/00/01&page=0&size=10"
  params:
    - name: jobIdentifier
      value: CRE000/00/01
      type: query
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

