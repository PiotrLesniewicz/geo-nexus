info:
  name: Change own password
  type: http
  seq: 2
  tags:
    - Account

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/companies/users/me/password"
  body:
    type: json
    data: |-
      {
        "oldPassword": "",
        "newPassword": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies/users/me/password"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "oldPassword": "",
            "newPassword": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""

docs: Allows the authenticated user to change their password by providing the current one
