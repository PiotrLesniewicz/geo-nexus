info:
  name: Change user role
  type: http
  seq: 3
  tags:
    - Account

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/companies/users/:email/role"
  params:
    - name: email
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "role": "ADMIN"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies/users/:email/role"
      method: PATCH
      params:
        - name: email
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "role": "ADMIN"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""

docs: Changes the role of a user within the company. Cannot demote the last active admin
