info:
  name: Register user
  type: http
  seq: 1
  tags:
    - Account

http:
  method: POST
  url: "{{baseUrl}}/api/v1/companies/users"
  body:
    type: json
    data: |-
      {
        "email": "jan.kowalski@example.com",
        "name": "Jan",
        "surname": "Kowalski",
        "role": "ADMIN",
        "password": "StrongPassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies/users"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "surname": "",
            "role": "ADMIN",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""

docs: Registers a new user within the authenticated admin's company
