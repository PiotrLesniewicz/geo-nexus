info:
  name: Get own profile
  type: http
  seq: 3
  tags:
    - Account

http:
  method: GET
  url: "{{baseUrl}}/api/v1/companies/users/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies/users/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "email": "",
            "name": "",
            "surname": "",
            "role": "ADMIN",
            "active": false,
            "registerAt": "",
            "deletedAt": "",
            "countJob": 0,
            "openJob": 0
          }

docs: Returns the profile and job statistics of the currently authenticated user
