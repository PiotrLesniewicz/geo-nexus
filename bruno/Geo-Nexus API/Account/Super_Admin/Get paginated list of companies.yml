info:
  name: Get paginated list of companies
  type: http
  seq: 3
  tags:
    - Account

http:
  method: GET
  url: "{{baseUrl}}/api/v1/companies?page=2&size=1"
  params:
    - name: page
      value: "2"
      type: query
    - name: size
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies"
      method: GET
      params:
        - name: page
          value: "0"
          type: query
        - name: size
          value: "10"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "totalElements": 0,
            "totalPages": 0,
            "pageable": {
              "paged": false,
              "pageNumber": 0,
              "pageSize": 0,
              "unpaged": false,
              "offset": 0,
              "sort": {
                "sorted": false,
                "unsorted": false,
                "empty": false
              }
            },
            "first": false,
            "last": false,
            "size": 0,
            "content": [
              {
                "id": 0,
                "name": "",
                "nip": "",
                "active": false,
                "registerAt": "",
                "blockedAt": ""
              }
            ],
            "number": 0,
            "sort": {
              "sorted": false,
              "unsorted": false,
              "empty": false
            },
            "numberOfElements": 0,
            "empty": false
          }

docs: |-
  Returns a paginated list of companies. Only accessible by SUPER_ADMIN.
  Supports pagination with optional page and size parameters.
  Maximum page size is limited to 50.
