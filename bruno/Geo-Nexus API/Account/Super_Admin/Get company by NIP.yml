info:
  name: Get company by NIP
  type: http
  seq: 3
  tags:
    - Account

http:
  method: GET
  url: "{{baseUrl}}/api/v1/companies/:nip"
  params:
    - name: nip
      value: "0987654321"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/companies/:nip"
      method: GET
      params:
        - name: nip
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "id": 0,
            "name": "",
            "nip": "",
            "active": false,
            "registerAt": "",
            "blockedAt": ""
          }

docs: |-
  Returns a single company based on its NIP (10-digit identifier).
  Only accessible by SUPER_ADMIN.
